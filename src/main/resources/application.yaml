spring:
  application:
    name: autotrade

  datasource:
    url: jdbc:mysql://localhost:3306/autotrade_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: MYSQL2025!
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: your-secret-key-change-in-production-minimum-256-bits
    expiration-ms: 86400000